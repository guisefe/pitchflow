name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Only what tests need (no PySpark — too heavy for CI, tests don't require it)
          pip install \
            confluent-kafka==2.4.0 \
            requests==2.31.0 \
            python-dotenv==1.0.1 \
            pytest==8.2.0 \
            pytest-cov==5.0.0 \
            ruff==0.4.4

      - name: Lint
        run: ruff check producer/ streaming/ dashboard/

      - name: Test
        run: |
          python -m pytest producer/tests/ streaming/tests/ \
            -v --tb=short \
            --cov=producer --cov=streaming \
            --cov-report=term-missing
