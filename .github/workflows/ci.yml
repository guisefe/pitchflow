name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          pip install --upgrade pip
          pip install confluent-kafka==2.4.0 requests==2.31.0 \
                      pytest==8.2.0 pytest-cov==5.0.0 python-dotenv==1.0.1

      - name: Run tests
        run: pytest producer/tests/ -v --cov=producer --cov-report=term-missing
